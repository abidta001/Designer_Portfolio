<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Illustration Gallery | ABID T A</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    background:#09090b;
}

.gallery-card{
    overflow:hidden;
    border-radius:24px;
    background:#18181b;
    cursor:pointer;
    transition:.4s ease;
}

.gallery-card:hover{
    transform:translateY(-8px);
}

.gallery-card img{
    width:100%;
    height:420px;
    object-fit:contain;
    transition:.5s;
}

.gallery-card:hover img{
    transform:scale(1.05);
}

.color-dot{
    width:28px;
    height:28px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.15);
}

.lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.lightbox.active{
    display:flex;
}

.lightbox img{
    display:block;
    max-width:90%;
    max-height:85vh;
    object-fit:contain;
}

.nav-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,.15);
    color:white;
    font-size:28px;
    cursor:pointer;
}

.prev{
    left:40px;
}

.next{
    right:40px;
}

.close-btn{
    position:absolute;
    top:30px;
    right:40px;
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    color:white;
    font-size:24px;
    cursor:pointer;
}
body.dark{
    background:#09090b;
    color:white;
}

body.light{
    background:#ffffff;
    color:#18181b;
}

body.light .gallery-card{
    background:white;
    border:1px solid #e4e4e7;
}

body.light p{
    color:#52525b;
}

body.light .color-dot{
    border:1px solid rgba(0,0,0,.1);
}

body.light #theme-toggle{
    background:#ffffff;
    color:#18181b;
    border:1px solid #e4e4e7;
}

body.dark #theme-toggle{
    background:#18181b;
    color:white;
}

body.light .lightbox{
    background:rgba(255,255,255,.96);
}

body.light .close-btn,
body.light .nav-btn{
    background:rgba(0,0,0,.08);
    color:#18181b;
}

</style>
</head>

<body class="transition-colors duration-500">
<button
id="theme-toggle"
class="fixed top-6 right-6 z-50 p-3 rounded-full bg-zinc-800 text-white shadow-lg hover:scale-110 transition"
>
    <svg
    id="theme-icon"
    xmlns="http://www.w3.org/2000/svg"
    class="w-6 h-6"
    fill="none"
    viewBox="0 0 24 24"
    stroke="currentColor">

        <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 3v1m0 16v1m8-9h1M3 12H2m15.364 6.364l.707.707M5.636 5.636l-.707-.707m12.728 0l-.707.707M5.636 18.364l-.707.707M12 7a5 5 0 100 10 5 5 0 000-10z"/>

    </svg>
</button>
<!-- Header -->

<section class="py-20 text-center px-6">

<h1 class="text-5xl font-bold mb-4">
ILLUSTRATION GALLERY
</h1>

<p class="text-zinc-400 max-w-2xl mx-auto">
A collection of hand-drawn and digitally refined illustrations showcasing creativity, character, and visual storytelling.
</p>

</section>

<!-- Gallery -->

<section class="max-w-6xl mx-auto px-6 pb-20">

<div class="grid md:grid-cols-2 gap-8">

<!-- Illustration 1 -->

<div class="gallery-card p-6"
onclick="openLightbox(0)">

<img src="assets/Images/Illustration/Night.jpg">

<div class="mt-5 flex items-center gap-3">

<div class="color-dot" style="background:#0e1b58"></div>
<div class="color-dot" style="background:#4d358d"></div>
<div class="color-dot" style="background:#5a4eb8"></div>
<div class="color-dot" style="background:#e394dd"></div>
<div class="color-dot" style="background:#ffacc1"></div>

</div>

</div>

<!-- Illustration 2 -->

<div class="gallery-card p-6"
onclick="openLightbox(1)">

<img src="assets/Images/Illustration/Bird.jpg">

<div class="mt-5 flex items-center gap-3">

<div class="color-dot" style="background:#050505"></div>
<div class="color-dot" style="background:#07123a"></div>
<div class="color-dot" style="background:#ffffff"></div>

</div>

</div>

<!-- Illustration 3 -->

<div class="gallery-card p-6"
onclick="openLightbox(2)">

<img src="assets/Images/Illustration/GreenLand.jpg">

<div class="mt-5 flex items-center gap-3">

<div class="color-dot" style="background:#171717"></div>
<div class="color-dot" style="background:#dc2626"></div>
<div class="color-dot" style="background:#f59e0b"></div>

</div>

</div>

<!-- Illustration 4 -->

<div class="gallery-card p-6"
onclick="openLightbox(3)">

<img src="assets/Images/Illustration/Mountain.jpg">

<div class="mt-5 flex items-center gap-3">

<div class="color-dot" style="background:#111827"></div>
<div class="color-dot" style="background:#8b5cf6"></div>
<div class="color-dot" style="background:#ec4899"></div>

</div>

</div>

</div>

</section>

<!-- Lightbox -->

<div class="lightbox" id="lightbox">

<button class="close-btn" onclick="closeLightbox()">
✕
</button>

<button class="nav-btn prev" onclick="prevImage()">
❮
</button>

<img id="lightboxImage">

<button class="nav-btn next" onclick="nextImage()">
❯
</button>

</div>

<script>
    
const images = [

"assets/Images/Illustration/Night.jpg",
"assets/Images/Illustration/Bird.jpg",
"assets/Images/Illustration/GreenLand.jpg",
"assets/Images/Illustration/Mountain.jpg"

];

let currentImage = 0;

function openLightbox(index){

    currentImage = index;

    document.getElementById("lightbox")
    .classList.add("active");

    document.getElementById("lightboxImage")
    .src = images[index];

}

function closeLightbox(){

    document.getElementById("lightbox")
    .classList.remove("active");

}

function nextImage(){

    currentImage =
    (currentImage + 1) % images.length;

    document.getElementById("lightboxImage")
    .src = images[currentImage];

}

function prevImage(){

    currentImage =
    (currentImage - 1 + images.length)
    % images.length;

    document.getElementById("lightboxImage")
    .src = images[currentImage];

}

document.addEventListener("keydown", e => {

    if(e.key === "Escape")
        closeLightbox();

    if(e.key === "ArrowRight")
        nextImage();

    if(e.key === "ArrowLeft")
        prevImage();

});

const body = document.body;
const toggle = document.getElementById("theme-toggle");
const icon = document.getElementById("theme-icon");

let theme =
localStorage.getItem("theme") || "dark";

setTheme(theme);

toggle.addEventListener("click",()=>{

    theme =
    body.classList.contains("dark")
    ? "light"
    : "dark";

    setTheme(theme);

});

function setTheme(mode){

    body.classList.remove("dark","light");
    body.classList.add(mode);

    localStorage.setItem("theme",mode);

    if(mode==="light"){

        icon.innerHTML = `
        <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M21 12.79A9 9 0 1111.21 3
        7 7 0 0021 12.79z"/>`;

    }else{

        icon.innerHTML = `
        <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 3v1m0 16v1m8-9h1M3 12H2m15.364 6.364l.707.707M5.636 5.636l-.707-.707m12.728 0l-.707.707M5.636 18.364l-.707.707M12 7a5 5 0 100 10 5 5 0 000-10z"/>`;

    }

}
</script>

</body>
</html>
